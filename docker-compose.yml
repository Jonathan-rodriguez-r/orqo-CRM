services:
  app:
    build:
      context: .
    container_name: orqo-crm-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      PHP_TIMEZONE: America/Bogota
      SITE_URL: "http://localhost:${APP_PORT:-8080}"
      SUITECRM_VERSION: "8.8.1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: orqo_crm
      DB_USER: orqo
      DB_PASSWORD: orqo_demo_password
      ADMIN_USER: admin
      ADMIN_PASSWORD: "ChangeMe123!"
      DEMO_DATA: "no"
      PERSIST_ROOT: /data
    volumes:
      - orqo_app_data:/var/www/html
      - orqo_persist:/data

  db:
    image: mariadb:10.11
    container_name: orqo-crm-db
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=128M
      --innodb_buffer_pool_size=512M
    environment:
      MARIADB_DATABASE: orqo_crm
      MARIADB_USER: orqo
      MARIADB_PASSWORD: orqo_demo_password
      MARIADB_ROOT_PASSWORD: orqo_root_password
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - orqo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  orqo_app_data:
  orqo_db_data:
  orqo_persist:
